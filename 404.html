<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 — GenAI Engineering</title>
  <meta property="og:title" content="404 Not Found — GenAI Engineering">
  <link rel="stylesheet" href="assets/css/base.css">
  <link rel="stylesheet" href="assets/css/layout.css">
  <style>
    .error-page {
      min-height: calc(100vh - 52px);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: var(--sp-8);
    }
    .error-page__inner {
      text-align: center;
      max-width: 480px;
    }
    .error-page__code {
      font-family: var(--font-heading);
      font-size: clamp(6rem, 20vw, 10rem);
      font-weight: 700;
      color: var(--color-text-dim);
      line-height: 1;
      letter-spacing: -0.06em;
      margin-bottom: var(--sp-4);
    }
    .error-page__code span { color: var(--color-accent); }
    .error-page__title {
      font-size: var(--text-xl);
      color: var(--color-text-muted);
      margin-bottom: var(--sp-6);
    }
    .error-page__message {
      font-size: var(--text-sm);
      color: var(--color-text-dim);
      margin-bottom: var(--sp-8);
      line-height: 1.7;
    }
    .error-page__link {
      display: inline-block;
      font-family: var(--font-mono);
      font-size: var(--text-sm);
      color: var(--color-accent);
      border: 1px solid var(--color-accent);
      padding: var(--sp-3) var(--sp-6);
      transition: background var(--transition-fast), color var(--transition-fast);
    }
    .error-page__link:hover {
      background: var(--color-accent);
      color: #000;
    }
  </style>
</head>
<body>
<header class="site-header" role="banner">
  <div class="site-header__inner">
    <a href="./" class="site-header__logo">[<span>GEN</span>AI.ENG]</a>
  </div>
</header>

<div class="error-page">
  <div class="error-page__inner">
    <p class="error-page__code">4<span>0</span>4</p>
    <h1 class="error-page__title">ページが見つかりません</h1>
    <p class="error-page__message">
      お探しのページは存在しないか、移動した可能性があります。<br>
      URLをご確認のうえ、トップページからお探しください。
    </p>
    <a href="./" class="error-page__link">← トップへ戻る</a>
  </div>
</div>
</body>
</html>
